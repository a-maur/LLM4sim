model_id: truck_cancellation_v01

params:
  n_destinations: 5
  time_steps_per_day: 16
  episode_days: 10
  start_day_of_week: 0
  truck_capacity: 120

  # Pre-booking sized from historical demand distribution.
  booking_service_level: 0.95
  booking_mc_samples: 800

  # One route decision per day.
  active_route_mode: cycle
  decision_step: 8

  # Day/season progression.
  default_season: high
  season_cycle: [high, high, high, high, high, low, low]

  cancellation_saving: 80.0
  penalty_unshipped_high: 12.0
  penalty_unshipped_low: 2.5

  high_priority:
    base_mean_by_destination: [110, 95, 85, 105, 90]
    day_of_week_weights: [1.10, 1.00, 0.95, 1.05, 1.15, 0.88, 0.82]
    season_weights:
      low: 0.80
      high: 1.25
    shared_shock_std: 0.11
    destination_shock_std: 0.14
    # Asymmetric: most volume registered early.
    registration_curve: [0.48, 0.66, 0.77, 0.84, 0.89, 0.93, 0.95, 0.97, 0.98, 0.985, 0.99, 0.995, 1.0, 1.0, 1.0, 1.0]

  low_priority:
    base_mean_by_destination: [210, 180, 170, 190, 160]
    day_of_week_weights: [1.05, 1.00, 0.98, 1.03, 1.10, 0.90, 0.86]
    season_weights:
      low: 0.88
      high: 1.12
    shared_shock_std: 0.09
    destination_shock_std: 0.11
    registration_curve: [0.42, 0.59, 0.71, 0.80, 0.86, 0.90, 0.93, 0.95, 0.97, 0.98, 0.988, 0.994, 0.998, 1.0, 1.0, 1.0]
