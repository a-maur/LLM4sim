model_id: truck_cancellation_v0

params:
  n_destinations: 4
  time_steps_per_day: 12
  decision_step: 8
  truck_capacity: 120
  trucks_per_day_by_destination: [3, 2, 3, 2]

  # Exogenous context for each episode/day.
  season: high
  day_of_week: 1

  # Demand base means per destination and priority.
  destination_base_mean_high: [95, 70, 90, 65]
  destination_base_mean_low: [180, 130, 160, 120]

  # Multipliers applied to both priorities.
  day_of_week_weights: [0.90, 1.00, 1.05, 1.10, 1.15, 0.95, 0.85]
  season_weights:
    low: 0.85
    high: 1.20

  # Correlated demand shocks.
  shared_shock_std: 0.08
  destination_shock_std: 0.12

  # Cumulative registered volume along the day.
  registration_curve: [0.04, 0.10, 0.18, 0.28, 0.39, 0.50, 0.62, 0.73, 0.83, 0.91, 0.97, 1.00]

  # Economic model.
  cancellation_saving: 70.0
  penalty_unshipped_high: 9.0
  penalty_unshipped_low: 2.0
